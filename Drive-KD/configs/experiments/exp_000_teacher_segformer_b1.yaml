# ============================================================
# Experiment 000
# Train SegFormer-B1 Teacher
# ============================================================

experiment:
  name: "exp_000_teacher_segformer_b1"
  stage: "teacher_training"
  seed: 42

  dataset_config: "configs/dataset/bdd100k_local.yaml"
  teacher_config: "configs/teacher/segformer_b1_teacher.yaml"

output:
  run_dir: "outputs/teacher_segformer_b1"
  checkpoint_dir: "outputs/teacher_segformer_b1/checkpoints"
  metrics_dir: "outputs/teacher_segformer_b1/metrics"
  visualization_dir: "outputs/teacher_segformer_b1/visualizations"
  config_dir: "outputs/teacher_segformer_b1/configs"

training:
  epochs: 30
  batch_size: 4
  grad_accum_steps: 2
  num_workers: 2

  amp: true
  channels_last: false
  compile: false
  resume: true

  optimizer:
    name: "adamw"
    lr: 0.00006
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine"
    min_lr: 0.000001
    warmup_epochs: 2

  gradient_clipping:
    enabled: true
    max_norm: 5.0

loss:
  road_weight: 1.0
  lane_weight: 1.0
  edge_weight: 1.5

  road:
    ce:
      enabled: true
      class_weights: [0.40, 1.00]
    dice:
      enabled: true
      smooth: 1.0

  lane:
    focal_ce:
      enabled: true
      alpha: 0.75
      gamma: 2.0
    dice:
      enabled: true
      smooth: 1.0

  edge:
    bce:
      enabled: true
      pos_weight: 4.0
    dice:
      enabled: true
      smooth: 1.0

metrics:
  thresholds:
    road: 0.50
    lane: 0.35
    edge: 0.40

  monitor: "val/lane_f1"
  mode: "max"

checkpointing:
  save_best: true
  save_last: true
  save_every_epoch: true
  monitor: "val/lane_f1"
  mode: "max"

validation:
  run_every_epoch: true
  max_visualizations: 16

logging:
  print_every: 50
  use_tensorboard: true