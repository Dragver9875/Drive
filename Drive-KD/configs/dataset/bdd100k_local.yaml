# ============================================================
# Drive-KD Track C Dataset Config
# Local BDD100K + local processed Drive masks
# ============================================================

dataset:
  name: "bdd100k_drive_kd_local"
  task: "road_lane_edge_segmentation"
  source: "local"

  # ------------------------------------------------------------
  # Input resolution used across teacher, cache generation,
  # KD training, evaluation, and export.
  # ------------------------------------------------------------
  image_height: 384
  image_width: 640
  channels: 3

  # ------------------------------------------------------------
  # EDIT THESE PATHS
  # ------------------------------------------------------------
  original_bdd_root: "D:/Datasets/bdd100k"
  processed_masks_root: "D:/Datasets/drive-bdd100k-processed"

  image_roots:
    train: "D:/Datasets/bdd100k/images/100k/train"
    val: "D:/Datasets/bdd100k/images/100k/val"

  # ------------------------------------------------------------
  # Portable manifests from drive-stage1-bdd100k-processed
  # ------------------------------------------------------------
  portable_manifests:
    train: "D:/Datasets/drive-bdd100k-processed/manifests/manifest_train_portable.csv"
    val: "D:/Datasets/drive-bdd100k-processed/manifests/manifest_val_portable.csv"

  # ------------------------------------------------------------
  # Generated by scripts/00_build_absolute_manifests.py
  # ------------------------------------------------------------
  absolute_manifests:
    train: "data/manifests/train_absolute.csv"
    val: "data/manifests/val_absolute.csv"

  # ------------------------------------------------------------
  # Generated during teacher-cache generation.
  # These join image paths, GT mask paths, and teacher-cache paths.
  # ------------------------------------------------------------
  kd_manifests:
    train: "data/manifests/train_kd.csv"
    val: "data/manifests/val_kd.csv"

  # ------------------------------------------------------------
  # Processed mask folders inside processed_masks_root.
  # These are relative to processed_masks_root.
  # ------------------------------------------------------------
  masks:
    road:
      train_rel: "road_masks/train"
      val_rel: "road_masks/val"

    lane:
      train_rel: "lane_masks/train"
      val_rel: "lane_masks/val"

    edge:
      train_rel: "edge_masks/train"
      val_rel: "edge_masks/val"

    convention:
      background_value: 0
      positive_value: 255
      threshold: 127

  # ------------------------------------------------------------
  # Expected rough dataset size. Used only for sanity checks.
  # ------------------------------------------------------------
  expected_counts:
    train_min_rows: 60000
    val_min_rows: 9000
    train_expected_rows: 69863
    val_expected_rows: 10000

  # ------------------------------------------------------------
  # Image normalization.
  # Same convention as ImageNet-pretrained encoders.
  # ------------------------------------------------------------
  normalization:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

  # ------------------------------------------------------------
  # DataLoader behavior.
  # ------------------------------------------------------------
  loader:
    num_workers: 2
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2

  # ------------------------------------------------------------
  # Augmentation policy.
  # Teacher and student should use consistent geometric transforms.
  # Cache generation should use validation/no-random transform.
  # ------------------------------------------------------------
  transforms:
    train:
      resize:
        enabled: true
        height: 384
        width: 640

      horizontal_flip:
        enabled: true
        p: 0.5

      brightness_contrast:
        enabled: true
        brightness_limit: 0.20
        contrast_limit: 0.20
        p: 0.35

      hue_saturation_value:
        enabled: true
        hue_shift_limit: 10
        sat_shift_limit: 25
        val_shift_limit: 20
        p: 0.25

      motion_blur:
        enabled: true
        blur_limit: 5
        p: 0.15

      gaussian_blur:
        enabled: true
        blur_limit: 3
        p: 0.10

      affine:
        enabled: true
        translate_percent_x: [-0.05, 0.05]
        translate_percent_y: [-0.05, 0.05]
        scale: [0.90, 1.10]
        rotate: [-3.0, 3.0]
        p: 0.35

    val:
      resize:
        enabled: true
        height: 384
        width: 640

    cache:
      resize:
        enabled: true
        height: 384
        width: 640