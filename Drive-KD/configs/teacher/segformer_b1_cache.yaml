# ============================================================
# Teacher Cache Generation Config
# Uses trained SegFormer-B1 teacher to generate cached soft targets
# ============================================================

teacher_cache:
  name: "segformer_b1_teacher_cache"
  teacher_name: "SegFormer-B1-DriveTeacher"

  input:
    height: 384
    width: 640

  checkpoint:
    path: "outputs/teacher_segformer_b1/checkpoints/best.pt"
    strict: true

  dataset:
    absolute_manifests:
      train: "data/manifests/train_absolute.csv"
      val: "data/manifests/val_absolute.csv"

  output:
    root: "data/cache/teacher_segformer_b1"

    probabilities:
      enabled: true
      train_dir: "data/cache/teacher_segformer_b1/probabilities/train"
      val_dir: "data/cache/teacher_segformer_b1/probabilities/val"
      dtype: "float16"
      file_format: "npz"

    logits:
      enabled: false
      train_dir: "data/cache/teacher_segformer_b1/logits/train"
      val_dir: "data/cache/teacher_segformer_b1/logits/val"
      dtype: "float16"
      file_format: "npz"

    boundaries:
      enabled: true
      train_dir: "data/cache/teacher_segformer_b1/boundaries/train"
      val_dir: "data/cache/teacher_segformer_b1/boundaries/val"
      dtype: "uint8"
      file_format: "png"

    attention:
      enabled: true
      train_dir: "data/cache/teacher_segformer_b1/attention/train"
      val_dir: "data/cache/teacher_segformer_b1/attention/val"
      dtype: "float16"
      file_format: "npz"
      layers:
        - "s2"
        - "s4"

    reports:
      dir: "data/cache/teacher_segformer_b1/reports"
      inventory: "data/cache/teacher_segformer_b1/reports/teacher_cache_inventory.json"
      train_report: "data/cache/teacher_segformer_b1/reports/teacher_cache_train_report.json"
      val_report: "data/cache/teacher_segformer_b1/reports/teacher_cache_val_report.json"

  kd_manifests:
    train: "data/manifests/train_kd.csv"
    val: "data/manifests/val_kd.csv"

  batch_size: 4
  num_workers: 2
  amp: true

  # ------------------------------------------------------------
  # Probabilities saved per image:
  #   road_prob: [H, W], float16
  #   lane_prob: [H, W], float16
  #   edge_prob: [H, W], float16
  # ------------------------------------------------------------
  probability_keys:
    road: "road_prob"
    lane: "lane_prob"
    edge: "edge_prob"

  # ------------------------------------------------------------
  # Boundary generation from teacher probabilities.
  # This gives softer/teacher-aware boundaries rather than only
  # morphology from hard GT masks.
  # ------------------------------------------------------------
  boundary_generation:
    enabled: true
    source: "teacher_edge_prob"
    edge_threshold: 0.40
    road_threshold: 0.50
    lane_threshold: 0.35
    method: "morphological_gradient"
    kernel_size: 3
    save_uint8_png: true

  validation:
    check_saved_files: true
    check_nonzero_probabilities: true
    check_nonzero_boundaries: true
    max_missing_allowed: 0